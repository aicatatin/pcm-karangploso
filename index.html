<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCM Karangploso - Portal Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .gradient-main { background: linear-gradient(135deg, #065f46 0%, #0d9488 100%); }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .hero-curve { border-radius: 0 0 30px 30px; }
        @media (min-width: 768px) { .hero-curve { border-radius: 0 0 100px 100px; } }
        .icon-card:active { transform: scale(0.9); transition: 0.1s; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 py-3 border-b border-gray-100">
        <div class="container mx-auto px-4 md:px-6 flex justify-between items-center">
            <div class="flex items-center space-x-2 md:space-x-3">
                <div class="w-8 h-8 md:w-10 md:h-10 gradient-main rounded-lg md:rounded-xl flex items-center justify-center text-white font-extrabold text-lg md:text-xl shadow-lg">K</div>
                <span class="font-bold text-sm md:text-lg tracking-tight text-slate-800">PCM KARANGPLOSO</span>
            </div>
            <button class="bg-emerald-800 text-white px-4 py-1.5 md:px-6 md:py-2 rounded-full text-[10px] md:text-xs font-extrabold shadow-md uppercase tracking-wider">APK</button>
        </div>
    </nav>

    <header class="gradient-main hero-curve pt-8 pb-20 md:pt-12 md:pb-28 px-4 md:px-6 text-white relative">
        <div class="container mx-auto grid lg:grid-cols-2 gap-6 md:gap-12 items-center">
            
            <div class="order-2 lg:order-1">
                <div class="glass rounded-2xl md:rounded-3xl p-5 md:p-8 shadow-2xl">
                    <div class="flex justify-between items-center mb-4 md:mb-6">
                        <span class="text-[10px] md:text-xs font-bold uppercase tracking-widest opacity-80">Yuk mulai baca dari</span>
                        <div class="flex space-x-2">
                            <div class="w-6 h-6 md:w-8 md:h-8 rounded-lg glass flex items-center justify-center text-[10px] md:text-xs"><i class="fas fa-moon"></i></div>
                            <div class="w-6 h-6 md:w-8 md:h-8 rounded-lg glass flex items-center justify-center text-[10px] md:text-xs"><i class="fas fa-expand"></i></div>
                        </div>
                    </div>
                    <h2 class="text-2xl md:text-4xl font-extrabold mb-3">Al-Fatihah</h2>
                    <div class="w-full bg-white/20 h-1.5 md:h-2 rounded-full overflow-hidden mb-2">
                        <div class="bg-emerald-300 h-full w-3/7 rounded-full shadow-[0_0_10px_rgba(110,231,183,0.7)]"></div>
                    </div>
                    <p class="text-right text-[10px] md:text-sm font-bold opacity-80 text-emerald-100">3/7 Ayat</p>
                </div>
            </div>

            <div class="order-1 lg:order-2">
                <div class="relative rounded-2xl md:rounded-[2rem] overflow-hidden border-2 md:border-4 border-white/30 shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=800" alt="SDU Permata Mulia" class="w-full h-40 md:h-72 object-cover">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-4 md:p-6 text-emerald-50">
                        <p class="text-sm md:text-xl font-extrabold uppercase">SDU Permata Mulia</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="container mx-auto -mt-10 md:-mt-16 px-4 md:px-6 relative z-20">
        <div class="bg-white rounded-2xl md:rounded-[2.5rem] shadow-xl p-6 md:p-10 grid grid-cols-4 md:grid-cols-8 gap-4 md:gap-8 border border-gray-50">
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-emerald-50 text-emerald-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                    <i class="fas fa-person-praying text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Sholat</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-blue-50 text-blue-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    <i class="fas fa-book-quran text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Al-Quran</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-orange-50 text-orange-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-orange-600 group-hover:text-white transition-colors">
                    <i class="fas fa-kaaba text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Kiblat</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-purple-50 text-purple-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-purple-600 group-hover:text-white transition-colors">
                    <i class="fas fa-hands-praying text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Doa</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-red-50 text-red-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-red-600 group-hover:text-white transition-colors">
                    <i class="fas fa-calendar-day text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Event</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-cyan-50 text-cyan-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-cyan-600 group-hover:text-white transition-colors">
                    <i class="fas fa-address-card text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">KTAM</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-yellow-50 text-yellow-600 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm group-hover:bg-yellow-600 group-hover:text-white transition-colors">
                    <i class="fas fa-book text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Buku</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-10 h-10 md:w-14 md:h-14 bg-gray-100 text-gray-400 rounded-xl md:rounded-2xl flex items-center justify-center mb-2 shadow-sm">
                    <i class="fas fa-ellipsis-h text-sm md:text-xl"></i>
                </div>
                <span class="text-[8px] md:text-[11px] font-extrabold text-slate-500 uppercase tracking-tighter md:tracking-wide">Lainnya</span>
            </div>
        </div>
    </section>

    <main class="container mx-auto py-10 md:py-16 px-4 md:px-6 mb-20">
        <h3 class="text-lg md:text-2xl font-extrabold text-slate-800 mb-6 flex items-center">
            <span class="w-1.5 md:w-2 h-6 md:h-8 bg-emerald-600 rounded-full mr-3"></span> Berita Terbaru
        </h3>
        <div id="daftar-berita" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            <div class="bg-white rounded-2xl md:rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 group">
                <div class="h-32 md:h-48 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover">
                </div>
                <div class="p-4 md:p-6">
                    <span class="text-[9px] md:text-[10px] font-extrabold text-emerald-600 bg-emerald-50 px-2 md:px-3 py-1 rounded-full uppercase">Karangploso</span>
                    <h4 class="font-bold text-slate-800 mt-2 md:mt-3 text-xs md:text-sm leading-snug">SDU Permata Mulia Melaksanakan Kunjungan Industri</h4>
                    <p class="text-[9px] md:text-[11px] text-slate-400 mt-3 flex items-center"><i class="far fa-clock mr-1"></i> 2 Jam yang lalu</p>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-4 right-4 md:bottom-8 md:right-8 z-[100]">
        <button class="gradient-main text-white px-4 md:px-6 py-2 md:py-3 rounded-xl md:rounded-2xl shadow-2xl flex items-center space-x-2 font-bold hover:scale-105 active:scale-95 border-2 border-white/20">
            <i class="fas fa-comment-dots text-sm md:text-lg"></i>
            <span class="text-xs md:text-sm">AI Assistant</span>
        </button>
    </div>

</body>
</html>
