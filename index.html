<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCM Karangploso - Portal Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-main { background: linear-gradient(135deg, #065f46 0%, #0d9488 100%); }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .hero-curve { border-radius: 0 0 50% 50% / 0 0 15% 15%; }
        .icon-card:hover { transform: translateY(-3px); transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 border-b border-gray-100">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 gradient-main rounded-xl flex items-center justify-center text-white font-extrabold text-xl shadow-lg">K</div>
                <span class="font-bold text-lg tracking-tight text-slate-800">PCM KARANGPLOSO</span>
            </div>
            <div class="hidden lg:flex space-x-8 text-sm font-semibold text-slate-600">
                <a href="#" class="hover:text-emerald-600 transition">Home</a>
                <a href="#" class="hover:text-emerald-600 transition">Berita</a>
                <a href="#" class="hover:text-emerald-600 transition">Amal Usaha</a>
                <a href="#" class="hover:text-emerald-600 transition">Layanan</a>
            </div>
            <button class="bg-emerald-800 hover:bg-emerald-900 text-white px-6 py-2 rounded-full text-xs font-extrabold transition shadow-md uppercase tracking-wider">Unduh APK</button>
        </div>
    </nav>

    <header class="gradient-main hero-curve pt-12 pb-28 px-6 text-white relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <svg width="100%" height="100%"><rect width="100%" height="100%" fill="url(#pattern)"/></svg>
        </div>

        <div class="container mx-auto grid lg:grid-cols-2 gap-12 items-center relative z-10">
            <div class="space-y-6">
                <div class="glass rounded-3xl p-8 max-w-lg shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xs font-bold uppercase tracking-widest opacity-80">Yuk mulai baca dari</span>
                        <div class="flex space-x-2">
                            <div class="w-8 h-8 rounded-lg glass flex items-center justify-center text-xs"><i class="fas fa-moon"></i></div>
                            <div class="w-8 h-8 rounded-lg glass flex items-center justify-center text-xs"><i class="fas fa-expand"></i></div>
                        </div>
                    </div>
                    <h2 class="text-4xl font-extrabold mb-4">Al-Fatihah</h2>
                    <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden mb-3">
                        <div class="bg-emerald-300 h-full w-3/7 rounded-full shadow-[0_0_10px_rgba(110,231,183,0.7)]"></div>
                    </div>
                    <p class="text-right text-sm font-bold opacity-80">3/7 Ayat</p>
                </div>
            </div>

            <div class="relative group">
                <div class="absolute -inset-2 bg-white/20 rounded-[2rem] blur-xl group-hover:blur-2xl transition duration-500"></div>
                <div class="relative rounded-[2rem] overflow-hidden border-4 border-white/30 shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=800" alt="SDU Permata Mulia" class="w-full h-72 object-cover">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6">
                        <p class="text-xl font-extrabold">SDU Permata Mulia Malang</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="container mx-auto -mt-16 px-6 relative z-20">
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-emerald-900/10 p-10 grid grid-cols-4 md:grid-cols-8 gap-8 border border-gray-50">
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                    <i class="fas fa-person-praying text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-emerald-700 uppercase tracking-wide">Sholat</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    <i class="fas fa-book-quran text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-blue-700 uppercase tracking-wide">Al-Quran</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-orange-50 text-orange-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-orange-600 group-hover:text-white transition-colors">
                    <i class="fas fa-kaaba text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-orange-700 uppercase tracking-wide">Kiblat</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-purple-600 group-hover:text-white transition-colors">
                    <i class="fas fa-hands-praying text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-purple-700 uppercase tracking-wide">Doa</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-red-600 group-hover:text-white transition-colors">
                    <i class="fas fa-calendar-day text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-red-700 uppercase tracking-wide">Event</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-cyan-50 text-cyan-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-cyan-600 group-hover:text-white transition-colors">
                    <i class="fas fa-address-card text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-cyan-700 uppercase tracking-wide">KTAM</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-yellow-50 text-yellow-600 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-yellow-600 group-hover:text-white transition-colors">
                    <i class="fas fa-book text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 group-hover:text-yellow-700 uppercase tracking-wide">Buku</span>
            </div>
            <div class="icon-card flex flex-col items-center group cursor-pointer">
                <div class="w-14 h-14 bg-gray-100 text-gray-500 rounded-2xl flex items-center justify-center mb-3 shadow-sm group-hover:bg-gray-600 group-hover:text-white transition-colors">
                    <i class="fas fa-ellipsis-h text-xl"></i>
                </div>
                <span class="text-[11px] font-extrabold text-slate-500 uppercase tracking-wide">Lainnya</span>
            </div>
        </div>
    </section>

    <main class="container mx-auto py-16 px-6">
        <h3 class="text-2xl font-extrabold text-slate-800 mb-8 flex items-center">
            <span class="w-2 h-8 bg-emerald-600 rounded-full mr-3"></span> Berita Terbaru
        </h3>
        <div id="daftar-berita" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 hover:shadow-xl transition group">
                <div class="h-48 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <div class="p-6">
                    <span class="text-[10px] font-extrabold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full uppercase tracking-tighter">Karangploso</span>
                    <h4 class="font-bold text-slate-800 mt-3 leading-snug group-hover:text-emerald-700">SDU Permata Mulia Malang Melaksanakan Kunjungan Industri</h4>
                    <p class="text-[11px] text-slate-400 mt-4 flex items-center"><i class="far fa-clock mr-1"></i> 2 Jam yang lalu</p>
                </div>
            </div>
            </div>
    </main>

    <div class="fixed bottom-8 right-8 z-[100]">
        <button class="gradient-main text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-2 font-bold hover:scale-105 transition active:scale-95 border-2 border-white/20">
            <i class="fas fa-comment-dots text-lg"></i>
            <span>AI Assistant</span>
        </button>
    </div>

</body>
</html>
